<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>1989 Compact Map (Interactive)</title>
    <style>
      :root {
        color-scheme: light;
      }
      * {
        box-sizing: border-box;
        user-select: none;
        -webkit-user-select: none;
      }
      body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #f4f5f7;
        color: #111827;
        overflow: hidden;
      }
      .app {
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 8px;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr);
        gap: 8px;
        overflow: hidden;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 24px;
      }
      .hint {
        margin: 0 0 10px;
        color: #334155;
        font-size: 14px;
      }
      .top-bar {
        display: none;
        grid-column: 2;
        grid-row: 1;
        flex-direction: column;
        gap: 8px;
        align-items: stretch;
        min-height: 0;
        margin: 0;
        overflow: hidden;
      }
      .status {
        flex: 1;
        margin: 0;
        padding: 8px 10px;
        border: 1px solid #d1d5db;
        border-radius: 8px;
        background: #ecfeff;
        color: #0f172a;
        font-size: 13px;
        min-height: 34px;
      }
      .vp-tracker {
        margin: 0;
        padding: 0;
        width: 100%;
        min-width: 0;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #f8fafc;
        color: #0f172a;
        font-size: 12px;
        overflow: hidden;
      }
      .vp-value {
        margin: 0;
        width: 100%;
        border: 0;
        background: transparent;
        color: inherit;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font: inherit;
        font-size: 22px;
        font-weight: 900;
        text-align: center;
        cursor: pointer;
        user-select: none;
        padding: 7px 8px;
      }
      .vp-value.vp-positive {
        background: #dbeafe;
        color: #1d4ed8;
      }
      .vp-value.vp-negative {
        background: #fee2e2;
        color: #b91c1c;
      }
      .vp-value.vp-neutral {
        background: #f8fafc;
        color: #111827;
      }
      .phase-tracker {
        margin: 0;
        padding: 0;
        width: 100%;
        min-width: 0;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #f8fafc;
        color: #0f172a;
        font-size: 12px;
        overflow: hidden;
      }
      .phase-value {
        margin: 0;
        width: 100%;
        border: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: inherit;
        font: inherit;
        font-size: 22px;
        font-weight: 900;
        text-align: center;
        cursor: pointer;
        user-select: none;
        border-radius: 0;
        padding: 7px 8px;
      }
      .phase-value.phase-early {
        background: #dbeafe;
      }
      .phase-value.phase-mid {
        background: #fef3c7;
      }
      .phase-value.phase-late {
        background: #fee2e2;
      }
      .route-tracker {
        margin: 0;
        padding: 6px 8px;
        width: 100%;
        min-width: 0;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #f8fafc;
        color: #0f172a;
        font-size: 12px;
      }
      .route-track {
        margin: 3px 0 0;
        display: flex;
        gap: 4px;
        justify-content: center;
      }
      .route-slot {
        width: 22px;
        height: 22px;
        border: 1.5px solid #111827;
        background: #ffffff;
      }
      .route-slot.filled {
        background: #1d4ed8;
      }
      .map-control-fo {
        overflow: visible;
      }
      .map-control-cluster {
        width: 100%;
        height: 100%;
        pointer-events: auto;
        font-family: Arial, Helvetica, sans-serif;
      }
      .map-top-controls {
        display: grid;
        grid-template-columns: repeat(10, minmax(0, 1fr));
        grid-template-rows: 76px 34px;
        gap: 6px;
        align-items: stretch;
      }
      .map-top-controls .vp-tracker {
        grid-column: 1 / 6;
      }
      .map-top-controls .phase-tracker {
        grid-column: 6 / 11;
      }
      .map-top-controls .vp-tracker,
      .map-top-controls .phase-tracker {
        height: 76px;
      }
      .map-top-controls .vp-value,
      .map-top-controls .phase-value {
        height: 100%;
        padding: 5px 10px;
        font-size: 34px;
      }
      .map-top-controls .state-button {
        height: 34px;
        border: 1.5px solid #111827;
        border-radius: 8px;
        background: #ffffff;
        color: #111827;
        font-size: 16px;
        font-weight: 900;
        cursor: pointer;
      }
      .map-top-controls .dice-game {
        grid-column: 1 / 3;
      }
      .map-top-controls .language-game {
        grid-column: 3 / 5;
      }
      .map-top-controls .save-game {
        grid-column: 5 / 7;
      }
      .map-top-controls .load-game {
        grid-column: 7 / 9;
      }
      .map-top-controls .reset-game {
        grid-column: 9 / 11;
      }
      .app .status,
      .app .page-header {
        display: none !important;
      }
      .dice-modal {
        position: fixed;
        inset: 0;
        z-index: 1000;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(15, 23, 42, 0.48);
      }
      .dice-modal[hidden] {
        display: none;
      }
      .dice-dialog {
        position: relative;
        width: min(360px, calc(100vw - 32px));
        border: 2px solid #111827;
        border-radius: 8px;
        background: #ffffff;
        color: #111827;
        padding: 22px;
        text-align: center;
        box-shadow: 0 18px 55px rgba(15, 23, 42, 0.28);
      }
      .dice-dialog h2 {
        margin: 0 38px 12px;
        font-size: 24px;
        letter-spacing: 0;
      }
      .dice-result {
        width: 132px;
        height: 132px;
        margin: 0 auto 18px;
        border: 3px solid #111827;
        border-radius: 8px;
        display: grid;
        place-items: center;
        background: #f8fafc;
        font-size: 88px;
        font-weight: 900;
        line-height: 1;
        transition: background-color 0.12s ease, color 0.12s ease, border-color 0.12s ease;
      }
      .dice-actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .dice-actions button,
      .dice-close-icon {
        border: 1.5px solid #111827;
        border-radius: 6px;
        background: #ffffff;
        color: #111827;
        font: inherit;
        font-size: 17px;
        font-weight: 900;
        cursor: pointer;
      }
      .dice-actions button {
        height: 42px;
      }
      .dice-close-icon {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 32px;
        height: 32px;
        padding: 0;
        font-size: 24px;
        line-height: 1;
      }
      .tiananmen-tracker {
        margin: 0;
        padding: 8px 10px;
        width: 100%;
        min-width: 0;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #f8fafc;
        color: #0f172a;
        font-size: 18px;
        display: grid;
        grid-template-columns: 232px minmax(0, 1fr);
        gap: 6px;
        align-items: stretch;
      }
      .tiananmen-fail-controls {
        min-width: 0;
        display: grid;
        grid-template-rows: minmax(0, 1fr) minmax(0, 1fr);
        gap: 6px;
      }
      .tiananmen-side-row {
        min-width: 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 4px;
      }
      .tiananmen-fail-button,
      .tiananmen-attempt-button {
        min-width: 0;
        border: 1.5px solid currentColor;
        border-radius: 5px;
        background: #ffffff;
        font: inherit;
        font-size: 16px;
        font-weight: 900;
        line-height: 1.05;
        white-space: pre-line;
        cursor: pointer;
      }
      .tiananmen-fail-button.dem,
      .tiananmen-attempt-button.dem {
        color: #1d4ed8;
      }
      .tiananmen-fail-button.com,
      .tiananmen-attempt-button.com {
        color: #b91c1c;
      }
      .tiananmen-fail-button.dem.active,
      .tiananmen-attempt-button.dem.active {
        background: #1d4ed8;
        color: #ffffff;
      }
      .tiananmen-fail-button.com.active,
      .tiananmen-attempt-button.com.active {
        background: #b91c1c;
        color: #ffffff;
      }
      .tiananmen-track {
        margin: 0;
        display: flex;
        flex-direction: row;
        gap: 4px;
        height: 100%;
      }
      .tiananmen-slot {
        border: 1.5px solid #111827;
        background: #ffffff;
        border-radius: 5px;
        padding: 6px 7px;
        min-width: 0;
        min-height: 0;
        flex: 1 1 0;
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        grid-template-rows: 34px minmax(0, 1fr) 34px;
        gap: 4px;
        align-items: center;
        font-size: 18px;
        line-height: 1.08;
        color: #334155;
      }
      .tiananmen-slot.reached-dem {
        box-shadow: inset 0 3px 0 #1d4ed8;
      }
      .tiananmen-slot.reached-com {
        box-shadow: inset 0 -3px 0 #b91c1c;
      }
      .tiananmen-slot.reached-dem.reached-com {
        box-shadow: inset 0 3px 0 #1d4ed8, inset 0 -3px 0 #b91c1c;
      }
      .tiananmen-target {
        width: 100%;
        min-width: 0;
        height: 34px;
        border-radius: 4px;
        display: grid;
        place-items: center;
        border: 1.4px solid currentColor;
        background: #ffffff;
        font-weight: 900;
        font-size: 22px;
        line-height: 1;
        cursor: pointer;
      }
      .tiananmen-target.dem {
        color: #1d4ed8;
      }
      .tiananmen-target.com {
        color: #b91c1c;
      }
      .tiananmen-target.current-dem {
        background: #1d4ed8;
        color: #ffffff;
        border-color: #1d4ed8;
      }
      .tiananmen-target.current-com {
        background: #b91c1c;
        color: #ffffff;
        border-color: #b91c1c;
      }
      .tiananmen-slot .track-main {
        min-width: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: #111827;
        font-weight: 800;
      }
      .tiananmen-slot.effect-dem .effect {
        color: #1d4ed8;
      }
      .tiananmen-slot.effect-com .effect {
        color: #b91c1c;
      }
      .tiananmen-slot.effect-inactive .effect {
        color: #6b7280;
      }
      .tiananmen-slot .effect {
        display: -webkit-box;
        overflow: hidden;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 4;
        font-size: 17px;
      }
      .map-tiananmen .tiananmen-tracker {
        height: 100%;
        padding: 8px;
      }
      .map-tiananmen .tiananmen-slot {
        height: 100%;
        padding: 6px 7px;
      }
      .map-info-panel,
      .country-info-panel {
        width: 100%;
        height: 100%;
        border: 1.4px solid #111827;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        color: #111827;
        overflow: hidden;
        pointer-events: none;
      }
      .map-info-panel {
        padding: 8px 10px;
        font-size: 18px;
        line-height: 1.18;
        font-weight: 800;
      }
      .type-legend-panel {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px 18px;
        align-content: center;
        font-size: 24px;
      }
      .type-legend-panel span {
        white-space: nowrap;
      }
      .power-rules-panel {
        display: grid;
        grid-template-columns: 1fr;
        gap: 2px;
      }
      .power-rules-panel strong {
        font-size: 20px;
      }
      .country-info-panel {
        padding: 6px 8px;
        font-size: 15px;
        line-height: 1.12;
        display: grid;
        gap: 2px;
      }
      .country-info-panel .country-info-title {
        font-size: 17px;
        font-weight: 900;
      }
      .country-info-panel .country-score-line {
        font-size: 18px;
        font-weight: 900;
      }
      .country-info-panel .dem-text {
        color: #1d4ed8;
      }
      .country-info-panel .com-text {
        color: #b91c1c;
      }
      .country-info-panel .muted-text {
        color: #4b5563;
      }
      .map-info-panel .dem-text,
      .country-info-panel .dem-text {
        color: #1d4ed8;
      }
      .map-info-panel .com-text,
      .country-info-panel .com-text {
        color: #b91c1c;
      }
      .map-info-panel .muted-text,
      .country-info-panel .muted-text {
        color: #4b5563;
      }
      .country-table-panel {
        padding: 8px;
        font-size: 17px;
        line-height: 1.05;
        pointer-events: auto;
      }
      .country-table-panel table {
        width: 100%;
        height: 100%;
        border-collapse: collapse;
        table-layout: fixed;
      }
      .country-table-panel th,
      .country-table-panel td {
        border-bottom: 1px solid rgba(17, 24, 39, 0.22);
        padding: 3px 4px;
        text-align: center;
        vertical-align: middle;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .country-table-panel th {
        font-size: 15px;
        font-weight: 900;
        background: rgba(241, 245, 249, 0.82);
      }
      .country-table-panel td {
        font-weight: 800;
      }
      .country-table-panel .country-cell {
        text-align: left;
        width: 22%;
      }
      .country-table-panel .wide-cell {
        width: 18%;
      }
      .country-table-panel .power-button {
        width: 100%;
        min-width: 0;
        border: 1.2px solid currentColor;
        border-radius: 5px;
        background: #ffffff;
        font: inherit;
        font-size: 15px;
        font-weight: 900;
        cursor: pointer;
        padding: 2px 3px;
      }
      .country-table-panel .power-button.power-dem {
        color: #1d4ed8;
      }
      .country-table-panel .power-button.power-com {
        color: #b91c1c;
      }
      .country-table-panel .power-bonus-note,
      .country-table-panel .power-value-note {
        color: #b91c1c;
        margin-left: 4px;
        font-weight: 900;
      }
      .country-table-panel .draw-separator {
        color: #111827;
        margin: 0 3px;
      }
      .stage {
        grid-column: 1;
        grid-row: 1;
        min-width: 0;
        min-height: 0;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #ffffff;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        align-self: center;
        width: 100%;
        height: auto;
        max-height: 100%;
        aspect-ratio: 2460 / 1605;
      }
      .stage svg {
        width: 100%;
        max-width: 100%;
        height: 100%;
        display: block;
      }
      .interactive-node {
        cursor: pointer;
        transition: filter 0.15s ease;
      }
      .interactive-node .slot-label {
        display: none;
        pointer-events: none;
      }
      .interactive-node .chip-type,
      .interactive-node .chip-value,
      .interactive-node .space-label,
      .interactive-node .sp-count,
      .interactive-node .chip-value-left,
      .interactive-node .chip-value-right {
        pointer-events: none;
        user-select: none;
      }
      .interactive-node .node-index {
        visibility: hidden;
      }
      .interactive-node .chip-type,
      .interactive-node .space-label {
        font-weight: 800;
      }
      .interactive-node .chip-type {
        font-size: 34px;
        fill: #006b5f;
        stroke: #ffffff;
        stroke-width: 0.65px;
        paint-order: stroke fill;
      }
      .interactive-node .space-label:not(.important-space) {
        fill: #111827;
      }
      .interactive-node .space-label.important-space {
        fill: #7c3aed;
      }
      .interactive-node:hover {
        filter: brightness(1.03);
      }
      .interactive-node circle,
      .interactive-node rect,
      .interactive-node path,
      .interactive-node text {
        transition: opacity 0.12s ease;
      }
      .value-bg {
        stroke: #111827;
        stroke-width: 1.15;
        fill: #ffffff;
        opacity: 0.96;
        pointer-events: none;
      }
      .value-bg-dominant-left,
      .value-bg-dominant-right {
        opacity: 0.95;
      }
      .value-bg-dominant-left {
        fill: #1d4ed8;
      }
      .value-bg-dominant-right {
        fill: #b91c1c;
      }
      .chip-value-left,
      .chip-value-right {
        font-size: 56px;
        font-weight: 900;
        letter-spacing: -0.5px;
        dominant-baseline: middle;
        text-anchor: middle;
        pointer-events: none;
        user-select: none;
        paint-order: stroke fill;
      }
      .chip-value-left {
        fill: #1d4ed8;
      }
      .chip-value-right {
        fill: #b91c1c;
      }
      .chip-value-left.dominant,
      .chip-value-right.dominant {
        fill: #ffffff;
      }
      .top-sep-line {
        stroke: #9aa2b1;
        stroke-width: 1;
        fill: none;
      }
      .chip-stability {
        fill: #be123c;
        stroke: #ffffff;
        stroke-width: 0.65px;
        font-weight: 700;
        pointer-events: none;
        paint-order: stroke fill;
        dominant-baseline: middle;
      }
      .chip-value-hidden {
        visibility: hidden;
      }

      .debug-overlay {
        margin-top: 8px;
        border: 1px dashed #94a3b8;
        border-radius: 8px;
        background: #f8fafc;
        color: #0f172a;
        padding: 8px;
        font-size: 11px;
        max-height: 140px;
        overflow: auto;
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        white-space: pre-wrap;
        line-height: 1.25;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="top-bar">
        <p class="status" id="status">Loading map...</p>
        <aside class="vp-tracker" id="vp-tracker" title="Left click -1, right click +1">
          <button class="vp-value" id="vp-value" type="button" data-value="0">VP: <strong>0</strong></button>
        </aside>
        <aside class="phase-tracker" id="phase-tracker" title="Left click -1, right click +1">
          <button class="phase-value phase-early" id="phase-value" type="button" data-value="1">Turn: <strong>1</strong></button>
        </aside>
        <button class="state-button dice-game" id="dice-game" type="button">Roll</button>
        <button class="state-button language-game" id="language-game" type="button">中文</button>
        <button class="state-button save-game" id="save-game" type="button">Save</button>
        <button class="state-button load-game" id="load-game" type="button">Load</button>
        <button class="state-button reset-game" id="reset-game" type="button">Reset</button>
        <aside class="tiananmen-tracker" id="tiananmen-tracker" title="Top numbers adjust D; bottom numbers adjust C. Left click +1, right click -1">
          <span id="tiananmen-dem-value" hidden>0</span>
          <span id="tiananmen-com-value" hidden>0</span>
          <span class="tiananmen-fail-controls" aria-label="Last Tiananmen attempt failed">
            <span class="tiananmen-side-row">
              <button class="tiananmen-fail-button dem" id="tiananmen-dem-failed" type="button" aria-pressed="false" title="Toggle D last attempt failed">D FAIL</button>
              <button class="tiananmen-attempt-button dem" id="tiananmen-dem-attempted" type="button" aria-pressed="false" title="Toggle D attempted this turn">D TRIED OFF</button>
            </span>
            <span class="tiananmen-side-row">
              <button class="tiananmen-fail-button com" id="tiananmen-com-failed" type="button" aria-pressed="false" title="Toggle C last attempt failed">C FAIL</button>
              <button class="tiananmen-attempt-button com" id="tiananmen-com-attempted" type="button" aria-pressed="false" title="Toggle C attempted this turn">C TRIED OFF</button>
            </span>
          </span>
          <p class="tiananmen-track" id="tiananmen-track" aria-label="Tiananmen Square track"></p>
        </aside>
        <aside class="route-tracker" id="route-tracker" title="Baltic Way (left click -1, right click +1)">
          <p class="route-track" id="route-track" aria-label="Baltic Way progress">
            <span class="route-slot" data-index="0"></span>
            <span class="route-slot" data-index="1"></span>
            <span class="route-slot" data-index="2"></span>
            <span class="route-slot" data-index="3"></span>
            <span class="route-slot" data-index="4"></span>
          </p>
          <p class="route-value" id="route-value" style="display:none;">0</p>
        </aside>
      </div>
      <section class="stage" id="map-root" aria-live="polite"></section>
    </main>

    <div class="dice-modal" id="dice-modal" hidden>
      <section class="dice-dialog" role="dialog" aria-modal="true" aria-labelledby="dice-title">
        <button class="dice-close-icon" id="dice-close-icon" type="button" aria-label="Close">×</button>
        <h2 id="dice-title">Die Roll</h2>
        <div class="dice-result" id="dice-result" aria-live="polite">1</div>
        <div class="dice-actions">
          <button id="dice-reroll" type="button">Roll Again</button>
          <button id="dice-close" type="button">Close</button>
        </div>
      </section>

      function parseTsv(url) {
        return fetch(url)
          .then((res) => {
            if (!res.ok) {
              throw new Error(`HTTP ${res.status}`);
            }
            return res.text();
          })
          .then((raw) => {
            const rows = raw.trim().split(/\r?\n/);
            if (!rows.length) {
              return [];
            }
            const delimiter = rows[0].includes("\t") ? "\t" : ",";
            return rows.map((line) => line.split(delimiter).map((s) => s.trim()));
          });
      }

      async function loadGameData() {
        const [setupRows, spaceRows, edgeRows] = await Promise.all([
          parseTsv(SP_SETUP_TSV),
          parseTsv(SPACES_TSV),
          parseTsv(EDGES_TSV),
        ]);

        setupRows.slice(1).forEach((row) => {
          const [name, dem, com] = row;
          if (!name) {
            return;
          }
          PARTY_SP[name] = {
            dem: Math.max(0, Number.parseInt(dem || "0", 10) || 0),
            com: Math.max(0, Number.parseInt(com || "0", 10) || 0),
          };
        });

        spaceRows.slice(1).forEach((row) => {
          const [, name, , country, stability, battleground, group] = row;
          if (!name) {
            return;
          }
          const stabilityValue = Number.parseInt(stability || "0", 10) || 0;
          PARTY_STABILITY[name] = stabilityValue;
          SPACE_META[name] = {
            country,
            stability: stabilityValue,
            battleground: battleground === "1",
            group,
          };
        });

        edgeRows.slice(1).forEach((row) => {
          const [a, b] = row;
          if (!a || !b) {
            return;
          }
          if (!SPACE_ADJACENCY.has(a)) SPACE_ADJACENCY.set(a, new Set());
          if (!SPACE_ADJACENCY.has(b)) SPACE_ADJACENCY.set(b, new Set());
          SPACE_ADJACENCY.get(a).add(b);
          SPACE_ADJACENCY.get(b).add(a);
        });
      }

        const code = COUNTRY_CODE[countryName];
        if (code) {
          const alias = NODE_NAME_ALIAS_BY_COUNTRY[`${spaceName}|${code}`];
          if (alias) {
            return alias;
          }

        return spaceName;
      }

        const canonicalSpaceName = resolveCanonicalNodeName(spaceName, countryName);

        if (direct) {
          return direct;
        }
        return null;
      }

        const canonicalSpaceName = resolveCanonicalNodeName(spaceName, countryName);
        const direct = PARTY_STABILITY[canonicalSpaceName];
        if (Number.isFinite(direct)) {
          return direct;
        }
        return 0;
      }

      function getSpaceMetaForNode(spaceName, countryName) {
        const canonicalSpaceName = resolveCanonicalNodeName(spaceName, countryName);
        return SPACE_META[canonicalSpaceName] || null;

          if (labelNode) {
            labelNode.textContent = `${label}: `;
          }
          valueText.textContent = String(value);
          return;
        }
        element.textContent = `${label}: ${value}`;
      }

        try {
          const lines = JSON.parse(node.dataset.originalNameLines || "[]");
          if (Array.isArray(lines) && lines.length) {

        return [node.dataset.space || ""];

          return getOriginalNodeNameLines(node);

        const key = `${node.dataset.countryCode || ""}|${node.dataset.space || ""}`;

      function normalizeCategoryCode(code) {
        return ({ Bu: "B", St: "S", Ch: "C" })[(code || "").trim()] || (code || "").trim();

      function getDisplayCategoryCode(code) {
        const normalized = normalizeCategoryCode(code);

      function getBalancedNameSplit(name) {
        const value = (name || "").trim();
        if (!value) {
          return null;
        }
        if (currentLanguage === "zh") {
          const chars = [...value];
          if (chars.length < 4) {
            return null;
          }
          const center = chars.length / 2;
          const punctuation = new Set(["·", "-", "/", "（", "）", "(", ")"]);
          let bestIndex = -1;
          let bestPenalty = Number.POSITIVE_INFINITY;
          for (let i = 1; i < chars.length; i += 1) {
            const punctuationPenalty = punctuation.has(chars[i - 1]) || punctuation.has(chars[i]) ? 2 : 0;
            const penalty = Math.abs(i - center) + punctuationPenalty;
            if (penalty < bestPenalty) {
              bestPenalty = penalty;
              bestIndex = i;
            }
          }
          return bestIndex > 0 ? [chars.slice(0, bestIndex).join(""), chars.slice(bestIndex).join("")] : null;
        }

        const candidates = [];
        for (let i = 1; i < value.length - 1; i += 1) {
          if (value[i] === " ") {
            candidates.push([value.slice(0, i).trim(), value.slice(i + 1).trim()]);
          } else if (value[i] === "-") {
            candidates.push([value.slice(0, i + 1).trim(), value.slice(i + 1).trim()]);
          }
        }
        return candidates
          .filter((parts) => parts[0] && parts[1])
          .sort((a, b) => Math.abs(a[0].length - a[1].length) - Math.abs(b[0].length - b[1].length))[0] || null;
      }

      function measureTextFitSize(textEl, text, width, height) {
        if (!textEl || width <= 0 || height <= 0) {
          return 0;
        }
        const previousText = textEl.textContent;
        const previousSize = textEl.style.fontSize;
        textEl.textContent = text;
        let lo = 3;
        let hi = 64;
        let best = 2;
        for (let step = 0; step < 14; step += 1) {
          const mid = Math.floor((lo + hi) / 2);
          textEl.style.fontSize = `${mid}px`;
          const fits = textEl.getComputedTextLength() <= width && Math.max(2, textEl.getBBox().height) <= height;
          if (fits) {
            best = mid;
            lo = mid + 1;
          } else {
            hi = mid - 1;
          }
        }
        textEl.textContent = previousText;
        textEl.style.fontSize = previousSize;
        return best;
      }

      function chooseNameLines(node, requestedLines, outer) {
        const cleaned = (requestedLines || []).map((line) => String(line || "").trim()).filter(Boolean);
        if (!cleaned.length || !outer) {
          return cleaned.length ? cleaned : [""];
        }
        const probe = node.querySelector("text.space-label");
        if (!probe) {
          return cleaned;
        }
        const joined = currentLanguage === "zh" ? cleaned.join("") : (node.dataset.space || cleaned.join(" "));
        const candidates = [[joined], cleaned.slice(0, 2)];
        const balanced = getBalancedNameSplit(joined);
        if (balanced) {
          candidates.push(balanced);
        }
        const unique = candidates.filter((candidate, index, all) => {
          const key = JSON.stringify(candidate);
          return candidate.every(Boolean) && all.findIndex((item) => JSON.stringify(item) === key) === index;
        });
        const nodeX = getRectValue(outer, "x");
        const nameLeft = nodeX + NODE_TEMPLATE.categoryWidth + 3;
        const nameRight = nodeX + NODE_TEMPLATE.width - NODE_TEMPLATE.stabilityWidth - 5;
        const availableWidth = Math.max(4, nameRight - nameLeft);
        const availableHeight = NODE_TEMPLATE.topRowHeight - 2;
        return unique
          .map((lines) => {
            const lineHeight = availableHeight / Math.max(1, lines.length);
            const fontSize = Math.min(...lines.map((line) => measureTextFitSize(probe, line, availableWidth, lineHeight)));
            return { lines, fontSize };
          })
          .sort((a, b) => b.fontSize - a.fontSize || a.lines.length - b.lines.length)[0].lines;
      }

      function renderNodeNames() {
        interactiveNodes.forEach((node) => {
          const outer = [...node.querySelectorAll("rect")].find((rect) => {
            const width = getRectValue(rect, "width");
            const height = getRectValue(rect, "height");
            return Math.abs(width - NODE_TEMPLATE.width) < 0.5 && Math.abs(height - NODE_TEMPLATE.height) < 0.5;
          });
          if (!outer) {
            return;
          }
          const requestedLines = getNodeDisplayLines(node);
          const key = `${node.dataset.countryCode || ""}|${node.dataset.space || ""}`;
          node.dataset.displayName = currentLanguage === "zh" ? requestedLines.join("") : (node.dataset.space || requestedLines.join(" "));
          node.dataset.displayLanguage = currentLanguage;
          node.dataset.translationMissing = currentLanguage === "zh" && !SPACE_LABEL_ZH[key] ? "1" : "0";
          ensureNameTexts(node, requestedLines, outer, node.dataset.battleground === "1");
          const lines = chooseNameLines(node, requestedLines, outer);
          ensureNameTexts(node, lines, outer, node.dataset.battleground === "1");
          ensureChipTypeText(node, node.dataset.categoryCode || node.querySelector("text.chip-type")?.textContent || "");

      function rollDie() {
        const random = new Uint32Array(2);
        let result;
        let colorRandom;
        if (window.crypto?.getRandomValues) {
          window.crypto.getRandomValues(random);
          result = (random[0] % 6) + 1;
          colorRandom = random[1];
        } else {
          result = Math.floor(Math.random() * 6) + 1;
          colorRandom = Math.floor(Math.random() * 0x100000000);
        }
        if (diceResult) {
          let paletteIndex;
          if (lastDicePaletteIndex < 0) {
            paletteIndex = colorRandom % DICE_PALETTES.length;
          } else {
            paletteIndex = colorRandom % (DICE_PALETTES.length - 1);
            if (paletteIndex >= lastDicePaletteIndex) {
              paletteIndex += 1;
            }
          }
          lastDicePaletteIndex = paletteIndex;
          const palette = DICE_PALETTES[paletteIndex];
          diceResult.textContent = String(result);
          diceResult.style.backgroundColor = palette.background;
          diceResult.style.color = palette.color;
          diceResult.style.borderColor = palette.color;
          diceResult.dataset.palette = String(paletteIndex);
        }
        setStatus(currentLanguage === "zh" ? `投骰结果：${result}` : `Die roll: ${result}`);
        return result;
      }

        persistGameState();

      function getPhaseClass(value) {
        if (value <= 3) return "phase-early";
        if (value <= 7) return "phase-mid";
        return "phase-late";
      }

      function updatePhase(delta) {
        const current = getTrackerValue(phaseValue, 1);
        const next = Math.min(10, Math.max(1, current + delta));
        const nextClass = getPhaseClass(next);
        if (next !== current) {
          TIANANMEN_ATTEMPTED.D = false;
          TIANANMEN_ATTEMPTED.C = false;
          renderTiananmenAttemptedMarkers();

        if (phaseValue) {
          phaseValue.classList.remove("phase-early", "phase-mid", "phase-late");

        }

        setStatus(`Turn: ${next} (1-3 blue, 4-7 yellow, 8-10 red)`);

      function getTiananmenEffectClass(index, dem, com) {
        if (index === 0 || (dem >= index && com >= index)) {
          return "effect-inactive";
        }
        if (dem >= index) {
          return "effect-dem";
        }
        if (com >= index) {
          return "effect-com";
        }
        return "";

          event.stopPropagation();

          event.stopPropagation();
          updateTiananmen(side, -1);

      function renderTiananmenFailureMarkers() {

          button.textContent = active ? `${side}\n${tr("nextRoll")}\n+1` : `${side}\n${tr("fail")}`;
        });

      function renderTiananmenAttemptedMarkers() {

          ["D", tiananmenDemAttempted],
          ["C", tiananmenComAttempted],
        ].forEach(([side, button]) => {
          if (!button) {
            return;
          }
          const active = Boolean(TIANANMEN_ATTEMPTED[side]);
          button.classList.toggle("active", active);
          button.setAttribute("aria-pressed", String(active));
          button.textContent = `${side}\n${tr("tried")}\n${active ? tr("on") : tr("off")}`;

      function toggleTiananmenFailure(side) {
        if (side !== "D" && side !== "C") {
          return;
        }
        TIANANMEN_FAILURE[side] = !TIANANMEN_FAILURE[side];
        if (TIANANMEN_FAILURE[side]) {
          TIANANMEN_ATTEMPTED[side] = true;

        renderTiananmenFailureMarkers();
        renderTiananmenAttemptedMarkers();
        persistGameState();
        setStatus(`Tiananmen ${side} last attempt: ${TIANANMEN_FAILURE[side] ? "failed" : "cleared"}`);
      }

      function toggleTiananmenAttempted(side) {
        if (side !== "D" && side !== "C") {
          return;
        }
        TIANANMEN_ATTEMPTED[side] = !TIANANMEN_ATTEMPTED[side];
        renderTiananmenAttemptedMarkers();
        persistGameState();
        setStatus(`Tiananmen ${side} attempted this turn: ${TIANANMEN_ATTEMPTED[side] ? "on" : "off"}`);
      }

      function renderTiananmenTrack() {
        if (!tiananmenTrack) {
          return;
        }
        const { dem, com } = getTiananmenPositions();
        tiananmenTrack.textContent = "";
        TIANANMEN_STEPS.forEach((step, index) => {
          const slot = document.createElement("span");
          slot.className = "tiananmen-slot";
          slot.dataset.index = String(index);
          const effectClass = getTiananmenEffectClass(index, dem, com);
          if (effectClass) {
            slot.classList.add(effectClass);
          }
          if (index <= dem) {
            slot.classList.add("reached-dem");
          }
          if (index <= com) {
            slot.classList.add("reached-com");
          }
          slot.title = [
            `Space ${index}`,
            `D ${step.demTarget || "-"}: ${step.dem}`,
            `C ${step.comTarget || "-"}: ${step.com}`,
            getTiananmenEffect(step),
          ].join("\n");

          const demTarget = document.createElement("span");
          demTarget.className = `tiananmen-target dem${index === dem ? " current-dem" : ""}`;
          demTarget.textContent = String(step.demTarget);
          demTarget.title = `D: ${tr("targetHint")}`;
          bindTiananmenTarget(demTarget, "D");

          const main = document.createElement("span");
          main.className = "track-main";

          effect.className = "effect";
          effect.textContent = getTiananmenEffect(step);
          main.appendChild(effect);

          const comTarget = document.createElement("span");
          comTarget.className = `tiananmen-target com${index === com ? " current-com" : ""}`;
          comTarget.textContent = String(step.comTarget);
          comTarget.title = `C: ${tr("targetHint")}`;
          bindTiananmenTarget(comTarget, "C");

          slot.appendChild(demTarget);
          slot.appendChild(main);
          slot.appendChild(comTarget);
          tiananmenTrack.appendChild(slot);
        });
        renderTiananmenFailureMarkers();
        renderTiananmenAttemptedMarkers();
      }

      function updateRoute(delta) {
        const current = Number.parseInt(routeValue?.textContent || "0", 10) || 0;
        const next = Math.min(5, Math.max(0, current + delta));
        routeValue.textContent = String(next);
        renderRoute(next);
        persistGameState();
        setStatus(`Baltic Way: ${next} / 5`);
      }

      function updateTiananmen(side, delta) {
        const valueEl = side === "D" ? tiananmenDemValue : tiananmenComValue;
        if (!valueEl) {
          return;
        }
        const current = Number.parseInt(valueEl.textContent || "0", 10) || 0;
        const next = Math.min(TIANANMEN_STEPS.length - 1, Math.max(0, current + delta));
        if (next > current) {
          TIANANMEN_FAILURE[side] = false;
          TIANANMEN_ATTEMPTED[side] = true;
        }
        valueEl.textContent = String(next);
        renderTiananmenTrack();
        const currentStep = TIANANMEN_STEPS[next] || TIANANMEN_STEPS[0];
        const label = side === "D" ? currentStep.dem : currentStep.com;
        const target = side === "D" ? currentStep.demTarget : currentStep.comTarget;
        persistGameState();
        setStatus(`Tiananmen ${side}: ${next} (${label}, target ${target || "-"})`);
      }

      function inferInitialSide(node) {
        const dem = Number.parseInt(node.dataset.dem || "0", 10) || 0;
        const com = Number.parseInt(node.dataset.com || "0", 10) || 0;
        if (com > dem) {
          return "C";
        }
        return "D";
      }

      const SVG_NS = "http://www.w3.org/2000/svg";
      const COLOR_D = "#1d4ed8";
      const COLOR_C = "#b91c1c";
      const NODE_TEMPLATE = {
        width: 172,
        height: 96,
        slotWidth: 86,
        slotHeight: 62,
        topRowHeight: 29,
        categoryWidth: 24,
        stabilityWidth: 14,
      };
      const MAP_CONTROL_LAYOUT = {
        top: { x: 1540, y: 140, width: 840, height: 116 },

      function createMapControlHost(svgEl, id, box, className) {
        svgEl.querySelector(`#${id}`)?.remove();

        foreignObject.id = id;

        foreignObject.setAttribute("y", String(box.y));
        foreignObject.setAttribute("width", String(box.width));
        foreignObject.setAttribute("height", String(box.height));
        foreignObject.setAttribute("overflow", "visible");
        if ((className.includes("map-info-panel") && !className.includes("country-table-panel")) || className.includes("country-info-panel")) {
          foreignObject.style.pointerEvents = "none";
        }

        const host = document.createElement("div");
        host.className = `map-control-cluster ${className}`;
        foreignObject.appendChild(host);
        svgEl.appendChild(foreignObject);
        return host;
      }

        MAP_INFO_HOSTS.countryTable = createMapControlHost(svgEl, "country-info-table", MAP_CONTROL_LAYOUT.countryTable, "map-info-panel country-table-panel");
