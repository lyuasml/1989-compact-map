      function getNodeControlSide(node) {
        const dem = Number.parseInt(node.dataset.dem || "0", 10) || 0;
        const com = Number.parseInt(node.dataset.com || "0", 10) || 0;
        const stability = Number.parseInt(node.dataset.stability || "0", 10) || 0;
        if (stability <= 0) {
          return "";
        }
        if (dem - com >= stability) {
          return "D";
        }
        if (com - dem >= stability) {
          return "C";
        }
        return "";
      }

      function summarizeCountry(code) {
        const countryNodes = interactiveNodes.filter((node) => node.dataset.countryCode === code);
        const summary = {
          D: { controlled: 0, battleground: 0, leaders: new Set() },
          C: { controlled: 0, battleground: 0, leaders: new Set() },
          totalBattleground: 0,
        };

        countryNodes.forEach((node) => {
          const isBattleground = node.dataset.battleground === "1";
          if (isBattleground) {
            summary.totalBattleground += 1;
          }
          const side = getNodeControlSide(node);
          if (!side) {
            return;
          }
          summary[side].controlled += 1;
          if (isBattleground) {
            summary[side].battleground += 1;
          }
          const leader = LEADER_BY_GROUP[node.dataset.groupCode || ""];
          if (leader) {
            summary[side].leaders.add(leader);
          }
        });

        return summary;
      }

      function computeCountrySideScore(scoring, sideSummary, opponentSummary, totalBattleground) {
        if (sideSummary.controlled <= 0) {
          return { base: 0, battleground: 0, total: 0, status: "No presence" };
        }

        const nonBattleground = sideSummary.controlled - sideSummary.battleground;
        let base = scoring.presence;
        let status = "Presence";
        if (
          sideSummary.controlled > opponentSummary.controlled &&
          totalBattleground > 0 &&
          sideSummary.battleground === totalBattleground
        ) {
          base = scoring.control;
          status = "Control";
        } else if (
          sideSummary.controlled > opponentSummary.controlled &&
          sideSummary.battleground > opponentSummary.battleground &&
          sideSummary.battleground > 0 &&
          nonBattleground > 0
        ) {
          base = scoring.domination;
          status = "Domination";
        }

        const battleground = sideSummary.battleground;
        return {
          base,
          battleground,
          total: base + battleground,
          status,
        };
      }

      function formatLeaders(leaders) {
        const values = [...leaders].sort();
        return values.length ? values.join("/") : "-";
      }

      function formatNetScoreValue(net) {
        if (net > 0) {
          return `<span class="dem-text">D +${net}</span>`;
        }
        if (net < 0) {
          return `<span class="com-text">C +${Math.abs(net)}</span>`;
        }
        return `<span class="muted-text">0</span>`;
      }

      function formatNetScore(demScore, comScore, powerBonus = 0) {
        return formatNetScoreValue(demScore.total - comScore.total);
      }

      function getPowerDrawCount(controlledSpaces) {
        return controlledSpaces > 0 ? 4 + 2 * controlledSpaces : 0;
      }

      function clampInt(value, min, max, fallback = min) {
        const parsed = Number.parseInt(value, 10);
        if (!Number.isFinite(parsed)) {
          return fallback;
        }
        return Math.min(max, Math.max(min, parsed));
      }

      function getNodeSaveKey(node, index = 0) {
        const country = node.dataset.countryCode || "";
        const space = node.dataset.space || node.dataset.baseTitle || `node-${index}`;
        return `${country}|${space}`;
      }

      function collectGameState() {
        return {
          version: 1,
          savedAt: new Date().toISOString(),
          language: currentLanguage,
          vp: getTrackerValue(vpValue, 0),
          turn: getTrackerValue(phaseValue, 1),
          route: Number.parseInt(routeValue?.textContent || "0", 10) || 0,
          tiananmen: {
            ...getTiananmenPositions(),
            failed: {
              dem: TIANANMEN_FAILURE.D,
              com: TIANANMEN_FAILURE.C,
            },
            attempted: {
              dem: TIANANMEN_ATTEMPTED.D,
              com: TIANANMEN_ATTEMPTED.C,
            },
          },
          power: Object.fromEntries(COUNTRY_ORDER.map((code) => {
            const state = COUNTRY_POWER_STATE[code] || { side: "C", count: 0 };
            return [code, {
              side: state.side === "D" ? "D" : "C",
              count: clampInt(state.count, 0, 4, 0),
            }];
          })),
          spaces: interactiveNodes.map((node, index) => ({
            key: getNodeSaveKey(node, index),
            space: node.dataset.space || "",
            countryCode: node.dataset.countryCode || "",
            dem: clampInt(node.dataset.dem, 0, 99, 0),
            com: clampInt(node.dataset.com, 0, 99, 0),
            stability: clampInt(node.dataset.stability, 0, 9, 0),
            side: node.dataset.side || inferInitialSide(node),
          })),
        };
      }

      function writeLocalSave(payload) {
        try {
          localStorage.setItem(SAVE_KEY, JSON.stringify(payload));
          return true;
        } catch (error) {
          return false;
        }
      }

      function readLocalSave() {
        try {
          return localStorage.getItem(SAVE_KEY);
        } catch (error) {
          return "";
        }
      }

      function collectCookieState() {
        return {
          v: 1,
          at: new Date().toISOString(),
          l: currentLanguage,
          vp: getTrackerValue(vpValue, 0),
          tu: getTrackerValue(phaseValue, 1),
          r: Number.parseInt(routeValue?.textContent || "0", 10) || 0,
          tn: [
            clampInt(tiananmenDemValue?.textContent, 0, TIANANMEN_STEPS.length - 1, 0),
            clampInt(tiananmenComValue?.textContent, 0, TIANANMEN_STEPS.length - 1, 0),
          ],
          tf: [TIANANMEN_FAILURE.D ? 1 : 0, TIANANMEN_FAILURE.C ? 1 : 0],
          ta: [TIANANMEN_ATTEMPTED.D ? 1 : 0, TIANANMEN_ATTEMPTED.C ? 1 : 0],
          p: COUNTRY_ORDER.map((code) => {
            const state = COUNTRY_POWER_STATE[code] || { side: "C", count: 0 };
            return `${state.side === "D" ? "D" : "C"}${clampInt(state.count, 0, 4, 0)}`;
          }).join("."),
          sp: interactiveNodes.map((node) => {
            return `${clampInt(node.dataset.dem, 0, 99, 0)}.${clampInt(node.dataset.com, 0, 99, 0)}`;
          }).join("_"),
        };
      }

      function readCookieValue(name) {
        const prefix = `${name}=`;
        return document.cookie
          .split(";")
          .map((entry) => entry.trim())
          .find((entry) => entry.startsWith(prefix))
          ?.slice(prefix.length) || "";
      }

      function writeCookieState(payload) {
        try {
          const encoded = encodeURIComponent(JSON.stringify(payload));
          const maxAge = 60 * 60 * 24 * 365;
          const attrs = location.protocol === "file:"
            ? `; max-age=${maxAge}`
            : `; max-age=${maxAge}; path=/; SameSite=Lax`;
          document.cookie = `${COOKIE_SAVE_KEY}=${encoded}${attrs}`;
          return readCookieValue(COOKIE_SAVE_KEY) === encoded;
        } catch (error) {
          return false;
        }
      }

      function expandCookieState(compact) {
        if (!compact || typeof compact !== "object") {
          throw new Error("Invalid cookie save data.");
        }
        const powerTokens = String(compact.p || "").split(".");
        const spTokens = String(compact.sp || "").split("_");
        return {
          version: compact.v || 1,
          savedAt: compact.at || "",
          language: compact.l === "zh" ? "zh" : compact.l === "en" ? "en" : undefined,
          vp: compact.vp,
          turn: compact.tu,
          route: compact.r,
          tiananmen: {
            dem: Array.isArray(compact.tn) ? compact.tn[0] : 0,
            com: Array.isArray(compact.tn) ? compact.tn[1] : 0,
            failed: {
              dem: Array.isArray(compact.tf) && compact.tf[0] === 1,
              com: Array.isArray(compact.tf) && compact.tf[1] === 1,
            },
            attempted: {
              dem: Array.isArray(compact.ta) && compact.ta[0] === 1,
              com: Array.isArray(compact.ta) && compact.ta[1] === 1,
            },
          },
          power: Object.fromEntries(COUNTRY_ORDER.map((code, index) => {
            const token = powerTokens[index] || "C0";
            return [code, {
              side: token.startsWith("D") ? "D" : "C",
              count: clampInt(token.slice(1), 0, 4, 0),
            }];
          })),
          spaces: interactiveNodes.map((node, index) => {
            const [dem, com] = (spTokens[index] || "0.0").split(".");
            return {
              key: getNodeSaveKey(node, index),
              dem,
              com,
              stability: node.dataset.stability || node.dataset.initialStability || "0",
              side: clampInt(com, 0, 99, 0) > clampInt(dem, 0, 99, 0) ? "C" : "D",
            };
          }),
        };
      }

      function readCookieState() {
        const encoded = readCookieValue(COOKIE_SAVE_KEY);
        if (!encoded) {
          return null;
        }
        try {
          return expandCookieState(JSON.parse(decodeURIComponent(encoded)));
        } catch (error) {
          return null;
        }
      }

      function persistGameState({ force = false } = {}) {
        if (!force && !autoSaveReady) {
          return false;
        }
        const cookieStored = writeCookieState(collectCookieState());
        const localStored = writeLocalSave(collectGameState());
        return cookieStored || localStored;
      }

      function applyGameState(state) {
        if (!state || typeof state !== "object" || !Array.isArray(state.spaces)) {
          throw new Error("Invalid save data.");
        }

        if (state.language === "zh" || state.language === "en") {
          currentLanguage = state.language;
        }
        const vp = clampInt(state.vp, -99, 99, 0);
        setTrackerButton(vpValue, tr("vp"), vp);
        applyVpClass(vp);
        const turn = clampInt(state.turn, 1, 10, 1);
        if (phaseValue) {
          phaseValue.classList.remove("phase-early", "phase-mid", "phase-late");
          phaseValue.classList.add(getPhaseClass(turn));
          setTrackerButton(phaseValue, tr("turn"), turn);
        }
        if (routeValue) {
          const route = clampInt(state.route, 0, 5, 0);
          routeValue.textContent = String(route);
          renderRoute(route);
        }
        if (tiananmenDemValue) {
          tiananmenDemValue.textContent = String(clampInt(state.tiananmen?.dem, 0, TIANANMEN_STEPS.length - 1, 0));
        }
        if (tiananmenComValue) {
          tiananmenComValue.textContent = String(clampInt(state.tiananmen?.com, 0, TIANANMEN_STEPS.length - 1, 0));
        }
        TIANANMEN_FAILURE.D = Boolean(state.tiananmen?.failed?.dem);
        TIANANMEN_FAILURE.C = Boolean(state.tiananmen?.failed?.com);
        TIANANMEN_ATTEMPTED.D = Boolean(state.tiananmen?.attempted?.dem);
        TIANANMEN_ATTEMPTED.C = Boolean(state.tiananmen?.attempted?.com);

        COUNTRY_ORDER.forEach((code) => {
          const saved = state.power?.[code];
          const target = COUNTRY_POWER_STATE[code];
          if (!target || !saved) {
            return;
          }
          target.side = saved.side === "D" ? "D" : "C";
          target.count = target.side === "C" ? clampInt(saved.count, 0, 4, 0) : 0;
        });

        const nodesByKey = new Map(interactiveNodes.map((node, index) => [getNodeSaveKey(node, index), node]));
        state.spaces.forEach((saved) => {
          const node = nodesByKey.get(saved.key);
          if (!node) {
            return;
          }
          node.dataset.dem = String(clampInt(saved.dem, 0, 99, 0));
          node.dataset.com = String(clampInt(saved.com, 0, 99, 0));
          node.dataset.stability = String(clampInt(saved.stability, 0, 9, Number.parseInt(node.dataset.stability || "0", 10) || 0));
          node.dataset.side = saved.side === "C" ? "C" : "D";
          applyDominanceStyle(node);
          updateNodeTooltip(node);
        });

        renderTiananmenTrack();
        refreshCountryPanels();
        applyLanguage({ persist: false });
        persistGameState({ force: true });
      }

      function saveGameState() {
        const payload = collectGameState();
        const stored = writeLocalSave(payload);
        const cookieStored = persistGameState({ force: true });
        const stamp = new Date(payload.savedAt).toLocaleString(currentLanguage === "zh" ? "zh-CN" : "en-US", { hour12: false });
        if (stored || cookieStored) {
          setStatus(`Saved game state: ${stamp}`);
          return;
        }
        window.prompt(tr("saveUnavailable"), JSON.stringify(payload));
      }

      function loadGameState() {
        const ok = window.confirm(tr("loadConfirm"));
        if (!ok) {
          setStatus(tr("loadCanceled"));
          return;
        }

        let state = readCookieState();
        let source = state ? "cookie" : "";
        let raw = "";
        if (!state) {
          raw = readLocalSave();
          source = raw ? "local save" : "";
        }
        if (!state && !raw) {
          raw = window.prompt(tr("noSavePrompt")) || "";
          source = raw ? "pasted save" : "";
        }
        if (!state && !raw.trim()) {
          setStatus(tr("noSave"));
          return;
        }
        try {
          if (!state) {
            state = JSON.parse(raw);
          }
          applyGameState(state);
          const stamp = state.savedAt ? new Date(state.savedAt).toLocaleString(currentLanguage === "zh" ? "zh-CN" : "en-US", { hour12: false }) : tr("unknownTime");
          setStatus(`Loaded ${source || "save"}: ${stamp}`);
        } catch (error) {
          window.alert(`${tr("loadError")}: ${error.message || error}`);
        }
      }

      function formatPowerState(code) {
        const state = COUNTRY_POWER_STATE[code] || { side: "C", count: 0 };
        if (state.side === "D") {
          return `<button class="power-button power-dem" type="button" data-country="${code}" title="${tr("restorePower")}">D</button>`;
        }
        return `<button class="power-button power-com" type="button" data-country="${code}" title="${tr("topplePower")}">C*${state.count}</button>`;
      }

      function getPowerBonus(code, scoring) {
        const state = COUNTRY_POWER_STATE[code] || { side: "C", count: 0 };
        return state.side === "C" ? scoring.power * state.count : 0;
      }

      function formatPowerBonusNote(powerBonus) {
        if (powerBonus <= 0) {
          return "";
        }
        return `<span class="power-bonus-note">(C +${powerBonus})</span>`;
      }

      function updateCountryPower(code, action) {
        if (!code || !COUNTRY_POWER_STATE[code]) {
          return;
        }
        const state = COUNTRY_POWER_STATE[code];
        if (action === "toggle") {
          if (state.side === "C") {
            state.side = "D";
          } else {
            state.side = "C";
            state.count = 0;
          }
        } else if (action === "count") {
          if (state.side === "C") {
            state.count = (state.count + 1) % 5;
          }
        }
        refreshCountryPanels();
        const scoring = COUNTRY_SCORING[code];
        persistGameState();
        setStatus(`${scoring?.label || code} power: ${state.side === "D" ? "D" : `C*${state.count}`}`);
      }

      function shortCountryLabel(code, label) {
        return COUNTRY_LABELS[currentLanguage]?.[code] || label;
      }

      function refreshCountryPanels() {
        const host = MAP_INFO_HOSTS.countryTable;
        if (!host) {
          return;
        }
        const rows = COUNTRY_ORDER.map((code) => {
          const scoring = COUNTRY_SCORING[code];
          const summary = summarizeCountry(code);
          const demScore = computeCountrySideScore(scoring, summary.D, summary.C, summary.totalBattleground);
          const comScore = computeCountrySideScore(scoring, summary.C, summary.D, summary.totalBattleground);
          const drawD = getPowerDrawCount(summary.D.controlled);
          const drawC = getPowerDrawCount(summary.C.controlled);
          const powerBonus = getPowerBonus(code, scoring);
          return `
            <tr>
              <td class="country-cell">${shortCountryLabel(code, scoring.label)}</td>
              <td>${scoring.presence}/${scoring.domination}/${scoring.control} <span class="power-value-note">(P${scoring.power})</span></td>
              <td><span class="dem-text">${drawD}</span><span class="draw-separator">/</span><span class="com-text">${drawC}</span></td>
              <td>${formatPowerState(code)}</td>
              <td>${formatNetScore(demScore, comScore)}${formatPowerBonusNote(powerBonus)}</td>
            </tr>
          `;
        }).join("");
        host.innerHTML = `
          <table aria-label="${tr("countryTableLabel")}">
            <thead>
              <tr>
                <th class="country-cell">${tr("country")}</th>
                <th>${tr("scoring")}</th>
                <th>${tr("draw")}</th>
                <th>${tr("power")}</th>
                <th>${tr("current")}</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      }

      function resetGameToStart() {
        const ok = window.confirm(tr("resetConfirm"));
        if (!ok) {
          return;
        }
        interactiveNodes.forEach((node) => {
          node.dataset.dem = node.dataset.initialDem || "0";
          node.dataset.com = node.dataset.initialCom || "0";
          node.dataset.stability = node.dataset.initialStability || node.dataset.stability || "0";
          node.dataset.side = inferInitialSide(node);
          applyDominanceStyle(node);
          updateNodeTooltip(node);
        });
        interactiveNodes.forEach(updateNodeTooltip);
        setTrackerButton(vpValue, tr("vp"), 0);
        applyVpClass(0);
        if (phaseValue) {
          phaseValue.classList.remove("phase-early", "phase-mid", "phase-late");
          phaseValue.classList.add("phase-early");
          setTrackerButton(phaseValue, tr("turn"), 1);
        }
        if (routeValue) {
          routeValue.textContent = "0";
        }
        if (tiananmenDemValue) {
          tiananmenDemValue.textContent = "0";
        }
        if (tiananmenComValue) {
          tiananmenComValue.textContent = "0";
        }
        TIANANMEN_FAILURE.D = false;
        TIANANMEN_FAILURE.C = false;
        TIANANMEN_ATTEMPTED.D = false;
        TIANANMEN_ATTEMPTED.C = false;
        Object.values(COUNTRY_POWER_STATE).forEach((state) => {
          state.side = "C";
          state.count = 0;
        });
        renderRoute(0);
        renderTiananmenTrack();
        refreshCountryPanels();
        persistGameState({ force: true });
        setStatus(tr("resetDone"));
      }

      function getNodeSlotRects(node) {
        return [...node.querySelectorAll("rect")].filter((rect) => {
          const width = Number.parseFloat(rect.getAttribute("width") || "0");
          const height = Number.parseFloat(rect.getAttribute("height") || "0");
          return Math.abs(width - NODE_TEMPLATE.slotWidth) < 0.5 && Math.abs(height - NODE_TEMPLATE.slotHeight) < 0.5;
        }).sort((a, b) => {
          const ax = Number.parseFloat(a.getAttribute("x") || "0");
          const bx = Number.parseFloat(b.getAttribute("x") || "0");
          return ax - bx;
        });
      }

      function getRectValue(rect, attr) {
        return Number.parseFloat(rect?.getAttribute(attr) || "0") || 0;
      }

      function getRectBounds(rect) {
        const x = getRectValue(rect, "x");
        const y = getRectValue(rect, "y");
        const width = getRectValue(rect, "width");
        const height = getRectValue(rect, "height");
        return {
          x,
          y,
          width,
          height,
          left: x,
          top: y,
          right: x + width,
          bottom: y + height,
        };
      }

      function collectNameLines(node, fallback) {
        const lines = [...node.querySelectorAll("text.space-label")].map((line) => line.textContent.trim()).filter(Boolean);
        if (lines.length) {
          return lines;
        }
        if (fallback) {
          return [fallback];
        }
        return [""];
      }

      function ensureNameTexts(node, lines, outer, important = false) {
        const desired = lines.length ? lines : [""];
        const existing = [...node.querySelectorAll("text.space-label")];
        const nodes = [];
        for (let i = 0; i < desired.length; i += 1) {
          let lineText = existing[i];
          if (!lineText) {
            lineText = document.createElementNS(SVG_NS, "text");
            lineText.setAttribute("class", "space-label");
            lineText.setAttribute("text-anchor", "middle");
            lineText.setAttribute("dominant-baseline", "middle");
            lineText.setAttribute("font-size", "11.2");
            lineText.style.pointerEvents = "none";
            lineText.style.userSelect = "none";
            node.appendChild(lineText);
          }
          lineText.textContent = desired[i];
          lineText.setAttribute("dominant-baseline", "middle");
          lineText.setAttribute("y", String(getRectValue(outer, "y") + 5));
          lineText.classList.remove("chip-value-hidden");
          lineText.classList.toggle("important-space", Boolean(important));
          nodes.push(lineText);
        }
        for (let i = desired.length; i < existing.length; i += 1) {
          existing[i].classList.add("chip-value-hidden");
        }
        return nodes;
      }

      function ensureTopSeparators(node, params) {
        const outer = params?.outer;
        if (!outer) {
          return;
        }
        const outerX = getRectValue(outer, "x");
        const outerY = getRectValue(outer, "y");
        const topY0 = outerY + 3;
        const topY1 = topY0 + NODE_TEMPLATE.topRowHeight;
        const leftLimit = outerX + NODE_TEMPLATE.categoryWidth;
        const stabLeft = outerX + NODE_TEMPLATE.width - NODE_TEMPLATE.stabilityWidth;
        const stableLineX = Math.min(stabLeft, outerX + NODE_TEMPLATE.width - 1);

        let typeSep = node.querySelector("line.top-sep-type");
        if (!typeSep) {
          typeSep = document.createElementNS(SVG_NS, "line");
          typeSep.setAttribute("class", "top-sep-line top-sep-type");
          node.appendChild(typeSep);
        }
        typeSep.setAttribute("x1", String(leftLimit));
        typeSep.setAttribute("y1", String(topY0));
        typeSep.setAttribute("x2", String(leftLimit));
        typeSep.setAttribute("y2", String(topY1));

        let stabilitySep = node.querySelector("line.top-sep-stability");
        if (!stabilitySep) {
          stabilitySep = document.createElementNS(SVG_NS, "line");
          stabilitySep.setAttribute("class", "top-sep-line top-sep-stability");
          node.appendChild(stabilitySep);
        }
        stabilitySep.setAttribute("x1", String(stableLineX));
        stabilitySep.setAttribute("y1", String(topY0));
        stabilitySep.setAttribute("x2", String(stableLineX));
        stabilitySep.setAttribute("y2", String(topY1));
      }

      function hideLegacyTopArtifacts(node, config, params) {
        if (config?.indexText) {
          config.indexText.classList.add("chip-value-hidden");
        }
        if (params?.typeTextRect) {
          params.typeTextRect.classList.add("chip-value-hidden");
        }
        if (!config?.outer) {
          return;
        }

        const topBandTop = getRectValue(config.outer, "y") + 1;
        const topBandBottom = getRectValue(config.outer, "y") + 40;
        const outerX = getRectValue(config.outer, "x");
        const outerWidth = getRectValue(config.outer, "width");

        [...node.querySelectorAll("rect")].forEach((rect) => {
          const width = getRectValue(rect, "width");
          const height = getRectValue(rect, "height");
          const x = getRectValue(rect, "x");
          const y = getRectValue(rect, "y");
          if (width <= 0 || height <= 0) {
            return;
          }

          const isLeftBadge = x > outerX && x < outerX + outerWidth * 0.5;
          const isRightBadge = x > outerX + outerWidth * 0.5 && x < outerX + outerWidth - 1;
          if (y >= topBandTop && y <= topBandBottom && width > 18 && width < 70 && height > 12 && height < 35 && (isLeftBadge || isRightBadge)) {
            rect.classList.add("chip-value-hidden");
          }
        });
      }

      function ensureChipTypeText(node, text) {
        let typeText = node.querySelector("text.chip-type");
        const outer = node.querySelector("rect[width='172'][height='96']") || [...node.querySelectorAll("rect")].find((rect) => {
          const width = getRectValue(rect, "width");
          const height = getRectValue(rect, "height");
          return Math.abs(width - NODE_TEMPLATE.width) < 0.5 && Math.abs(height - NODE_TEMPLATE.height) < 0.5;
        });

        if (!typeText) {
          if (!outer) {
            return null;
          }
          typeText = document.createElementNS(SVG_NS, "text");
          typeText.setAttribute("class", "chip-type");
          typeText.setAttribute("text-anchor", "middle");
          node.appendChild(typeText);
        }
        const outerX = getRectValue(outer, "x");
        const outerY = getRectValue(outer, "y");
        typeText.setAttribute("x", String(outerX + NODE_TEMPLATE.categoryWidth / 2 + 0.5));
        typeText.setAttribute("y", String(outerY + 17.5));
        typeText.setAttribute("dominant-baseline", "middle");
        typeText.textContent = getDisplayCategoryCode(text);
        return typeText;
      }

      function collectNodeTemplateParams(node, index) {
        const title = node.dataset.baseTitle || "";
        const [spaceName, countryName] = title.split(" - ");
        const outer = [...node.querySelectorAll("rect")].find((rect) => {
          const width = getRectValue(rect, "width");
          const height = getRectValue(rect, "height");
          return Math.abs(width - NODE_TEMPLATE.width) < 0.5 && Math.abs(height - NODE_TEMPLATE.height) < 0.5;
        });
        if (!outer) {
          return null;
        }
        const slotRects = getNodeSlotRects(node);
        if (slotRects.length < 2) {
          return null;
        }

        const indexRect = [...node.querySelectorAll("rect")].find((rect) => {
          const width = getRectValue(rect, "width");
          const height = getRectValue(rect, "height");
          return width > 18 && width < 25 && height > 16 && height < 20;
        });
        const indexText = node.querySelector("text.node-index");
        const typeText = node.querySelector("text.chip-type");
        const typeTextRect = [...node.querySelectorAll("rect")].find((rect) => {
          const width = getRectValue(rect, "width");
          const height = getRectValue(rect, "height");
          return width > 20 && width < 60 && height > 12 && height < 32 && getRectValue(rect, "y") < getRectValue(outer, "y") + 40;
        });
        const nameLines = collectNameLines(node, spaceName);
        const important = [...node.querySelectorAll("text.space-label")].some((line) => {
          const fill = (line.getAttribute("fill") || "").trim().toLowerCase();
          return fill === "#b91c1c" || fill === "#dc2626" || fill === "red";
        });
        return {
          node,
          index,
          title,
          spaceName: (spaceName || "").trim(),
          countryName: (countryName || "").trim(),
          category: (typeText?.textContent || "").trim(),
          nameLines,
          outer,
          slotRects,
          slotLeft: slotRects[0],
          slotRight: slotRects[1],
          indexText,
          indexRect,
          typeText,
          typeTextRect,
          position: {
            x: getRectValue(outer, "x"),
            y: getRectValue(outer, "y"),
            width: getRectValue(outer, "width"),
            height: getRectValue(outer, "height"),
          },
          initialInfluence: {
            D: 0,
            C: 0,
          },
          stability: 0,
          important,
          // Name compatibility: the current map label is the space name.
          name: (spaceName || "").trim(),
        };
      }

      function buildCompactNodeTemplate(baseParams, overrides = {}) {
        const initialInfluence = {
          D: Number.parseInt(overrides?.initialDem, 10),
          C: Number.parseInt(overrides?.initialCom, 10),
        };

        return {
          node: baseParams.node,
          index: baseParams.index,
          position: {
            x: overrides?.position?.x ?? baseParams.position.x,
            y: overrides?.position?.y ?? baseParams.position.y,
            width: overrides?.position?.width ?? baseParams.position.width,
            height: overrides?.position?.height ?? baseParams.position.height,
          },
          name: overrides?.name ?? baseParams.name,
          category: overrides?.category ?? baseParams.category,
          spaceName: baseParams.spaceName,
          countryName: baseParams.countryName,
          nameLines: overrides?.nameLines ?? baseParams.nameLines,
          important: overrides?.important ?? baseParams.important,
          outer: baseParams.outer,
          slotRects: baseParams.slotRects,
          slotLeft: baseParams.slotLeft,
          slotRight: baseParams.slotRight,
          indexRect: baseParams.indexRect,
          typeText: baseParams.typeText,
          typeTextRect: baseParams.typeTextRect,
          initialInfluence: {
            D: Number.isFinite(initialInfluence.D) ? initialInfluence.D : baseParams.initialInfluence.D,
            C: Number.isFinite(initialInfluence.C) ? initialInfluence.C : baseParams.initialInfluence.C,
          },
          stability: Number.parseInt(overrides?.stability, 10) || baseParams.stability,
          title: baseParams.title,
        };
      }

      function getPointerSideFromSlots(node, event) {
        const slotRects = getNodeSlotRects(node);
        if (slotRects.length < 2 || !event) {
          const bounds = node.getBoundingClientRect();
          const halfX = bounds.left + bounds.width / 2;
          return event && Number.isFinite(event.clientX) ? (event.clientX <= halfX ? "D" : "C") : "D";
        }

        const { left, right, top, bottom } = node.getBoundingClientRect();
        const x = Number.isFinite(event.clientX) ? event.clientX : (left + right) / 2;
        const y = Number.isFinite(event.clientY) ? event.clientY : (top + bottom) / 2;
        for (let i = 0; i < 2; i += 1) {
          const slotRect = slotRects[i];
          const b = slotRect.getBoundingClientRect();
          if (x >= b.left && x <= b.right && y >= b.top && y <= b.bottom) {
            return i === 0 ? "D" : "C";
          }
        }
        const splitX = (slotRects[0].getBoundingClientRect().right + slotRects[1].getBoundingClientRect().left) / 2;
        return x <= splitX ? "D" : "C";
      }

      function bindSlot(node, slot, side, spaceName) {
        slot.classList.add("slot-sp");
        slot.classList.add(side === "D" ? "slot-sp-left" : "slot-sp-right");
        slot.setAttribute("aria-label", `${spaceName} ${side} area`);
        slot.setAttribute("data-slot-side", side);
        slot.style.cursor = "pointer";
        slot.style.pointerEvents = "all";
        slot.style.userSelect = "none";

        const onInc = (event) => {
          event.preventDefault();
          event.stopPropagation();
          setNodeValue(node, side, +1, spaceName);
        };
        const onDec = (event) => {
          event.preventDefault();
          event.stopPropagation();
          setNodeValue(node, side, -1, spaceName);
        };

        slot.addEventListener("click", onInc);
        slot.addEventListener("contextmenu", onDec);
      }

      function ensureNodeTemplateElements(node, config, params) {
        if (!config.slotRects?.length) {
          return;
        }

        const slotLeft = config.slotRects[0];
        const slotRight = config.slotRects[1];
        ensureValueBg(node, slotLeft, "left");
        ensureValueBg(node, slotRight, "right");
        ensureSideValueText(node, slotLeft, "left");
        ensureSideValueText(node, slotRight, "right");
        ensureChipTypeText(node, params?.category || params?.type || "");
        const requestedNameLines = params?.nameLines || config.nameLines || [];
        ensureNameTexts(node, requestedNameLines, config.outer, params?.important);
        const displayNameLines = chooseNameLines(node, requestedNameLines, config.outer);
        ensureNameTexts(node, displayNameLines, config.outer, params?.important);
        hideLegacyChipArtifacts(node);
        hideLegacyTopArtifacts(node, config, params);
        ensureTopSeparators(node, config);
        layoutNodeTopTexts(node, config, { ...params, nameLines: displayNameLines });
      }

      function renderCompactNodeFromTemplate(params) {
        const node = params?.node;
        if (!node) {
          return;
        }

        const initialDem = params?.initialInfluence?.D ?? 0;
        const initialCom = params?.initialInfluence?.C ?? 0;
        const spaceName = params.name || params.spaceName || "";
        const countryName = params.countryName || "";
        const meta = getSpaceMetaForNode(spaceName, countryName);
        const countryCode = meta?.country || COUNTRY_CODE[countryName] || "";
        node.dataset.space = params.name || params.spaceName || "";
        node.dataset.originalNameLines = JSON.stringify(params.nameLines?.length ? params.nameLines : [spaceName]);
        node.dataset.countryCode = countryCode;
        node.dataset.groupCode = meta?.group || "";
        node.dataset.categoryCode = normalizeCategoryCode(params.category || params.type || "");
        node.dataset.battleground = meta?.battleground ? "1" : "0";
        node.dataset.dem = String(Math.max(0, Number.isFinite(Number.parseInt(initialDem, 10)) ? Number.parseInt(initialDem, 10) : 0));
        node.dataset.com = String(Math.max(0, Number.isFinite(Number.parseInt(initialCom, 10)) ? Number.parseInt(initialCom, 10) : 0));
        node.dataset.stability = String(params.stability || meta?.stability || 0);
        node.dataset.initialDem = node.dataset.dem;
        node.dataset.initialCom = node.dataset.com;
        node.dataset.initialStability = node.dataset.stability;
        node.dataset.side = inferInitialSide(node);
        ensureNodeTemplateElements(node, params, params);
        applyDominanceStyle(node);
        updateNodeTooltip(node);
        node.classList.add("interactive-node");
        node.style.pointerEvents = "all";
      }

      function ensureValueBg(node, slotRect, side) {
        const className = side === "left" ? "value-bg-left" : "value-bg-right";
        let bg = node.querySelector(`rect.${className}`);
        if (!bg) {
          bg = document.createElementNS(SVG_NS, "rect");
          bg.setAttribute("class", `value-bg ${className}`);
          node.appendChild(bg);
        }
        bg.setAttribute("x", slotRect.getAttribute("x") || "0");
        bg.setAttribute("y", slotRect.getAttribute("y") || "0");
        bg.setAttribute("width", slotRect.getAttribute("width") || "0");
        bg.setAttribute("height", slotRect.getAttribute("height") || "0");
        bg.setAttribute("rx", slotRect.getAttribute("rx") || "0");
        bg.setAttribute("class", `value-bg ${className}`);
        return bg;
      }

      function ensureSideValueText(node, slotRect, side) {
        const className = side === "left" ? "chip-value-left" : "chip-value-right";
        const selector = `text.${className}`;
        let valueText = node.querySelector(selector);
        if (!valueText) {
          valueText = document.createElementNS(SVG_NS, "text");
          valueText.setAttribute("class", className);
          valueText.setAttribute("text-anchor", "middle");
          valueText.setAttribute("dominant-baseline", "middle");
          node.appendChild(valueText);
        }
        valueText.setAttribute("x", String(Number.parseFloat(slotRect.getAttribute("x") || "0") + Number.parseFloat(slotRect.getAttribute("width") || "0") / 2));
        valueText.setAttribute("y", String(Number.parseFloat(slotRect.getAttribute("y") || "0") + Number.parseFloat(slotRect.getAttribute("height") || "0") / 2 + 1));
        return valueText;
      }

      function hideLegacyChipArtifacts(node) {
        [...node.querySelectorAll("text.chip-value")].forEach((legacyValueText) => {
          legacyValueText.classList.add("chip-value-hidden");
          legacyValueText.textContent = "0";
        });
        [...node.querySelectorAll("text.sp-count")].forEach((legacySpText) => {
          legacySpText.classList.add("chip-value-hidden");
        });
      }

      function applyDominanceStyle(node) {
        const dem = Number.parseInt(node.dataset.dem || "0", 10) || 0;
        const com = Number.parseInt(node.dataset.com || "0", 10) || 0;
        const stability = Number.parseInt(node.dataset.stability || "0", 10) || 0;
        const dominantSide = dem - com >= stability ? "D" : com - dem >= stability ? "C" : "none";
        const demBg = node.querySelector("rect.value-bg-left");
        const comBg = node.querySelector("rect.value-bg-right");
        const demText = node.querySelector("text.chip-value-left");
        const comText = node.querySelector("text.chip-value-right");
        const demValue = Number.parseInt(node.dataset.dem || "0", 10) || 0;
        const comValue = Number.parseInt(node.dataset.com || "0", 10) || 0;

        if (demBg) {
          demBg.setAttribute("class", "value-bg value-bg-left" + (dominantSide === "D" ? " value-bg-dominant-left" : ""));
        }
        if (comBg) {
          comBg.setAttribute("class", "value-bg value-bg-right" + (dominantSide === "C" ? " value-bg-dominant-right" : ""));
        }

        if (demText) {
          demText.textContent = String(demValue);
          demText.classList.toggle("chip-value-hidden", demValue <= 0);
          demText.classList.toggle("dominant", dominantSide === "D");
        }
        if (comText) {
          comText.textContent = String(comValue);
          comText.classList.toggle("chip-value-hidden", comValue <= 0);
          comText.classList.toggle("dominant", dominantSide === "C");
        }
        if (demText) {
          const bounds = getRectBounds(demBg);
          fitTextToRect(demText, bounds.left, bounds.right, bounds.top, bounds.bottom);
        }
        if (comText) {
          const bounds = getRectBounds(comBg);
          fitTextToRect(comText, bounds.left, bounds.right, bounds.top, bounds.bottom);
        }

        upsertStabilityBadge(node, Number.parseInt(node.dataset.stability || "0", 10) || 0);
      }

      function updateNodeTooltip(node) {
        const countryName = COUNTRY_BY_CODE[node.dataset.countryCode || ""] || "";
        const canonicalName = resolveCanonicalNodeName(node.dataset.space || "", countryName);
        const nodeByCanonicalName = new Map(interactiveNodes.map((candidate) => {
          const candidateCountry = COUNTRY_BY_CODE[candidate.dataset.countryCode || ""] || "";
          return [resolveCanonicalNodeName(candidate.dataset.space || "", candidateCountry), candidate];
        }));
        let demControlled = 0;
        let comControlled = 0;
        (SPACE_ADJACENCY.get(canonicalName) || new Set()).forEach((neighborName) => {
          const neighborNode = nodeByCanonicalName.get(neighborName);
          if (!neighborNode) {
            return;
          }
          const side = getNodeControlSide(neighborNode);
          if (side === "D") demControlled += 1;
          if (side === "C") comControlled += 1;
        });
        const modifier = demControlled - comControlled;
        const signedModifier = modifier > 0 ? `+${modifier}` : String(modifier);
        const tooltip = currentLanguage === "zh"
          ? `支持检定修正：${signedModifier}（邻接 D ${demControlled} - C ${comControlled}）`
          : `Support Check modifier: ${signedModifier} (adjacent D ${demControlled} - C ${comControlled})`;
        const titleEl = node.querySelector("title");
        if (titleEl) {
          titleEl.textContent = tooltip;
        }
      }

      function fitTextToRect(textEl, left, right, top, bottom) {
        if (!textEl || !Number.isFinite(left) || !Number.isFinite(right) || !Number.isFinite(top) || !Number.isFinite(bottom) || right <= left) {
          return;
        }

        const minSize = 3;
        const maxSize = 64;
        const availableWidth = Math.max(4, right - left);
        const availableHeight = Math.max(4, bottom - top);

        let lo = minSize;
        let hi = maxSize;
        let best = 2;

        for (let step = 0; step < 14; step += 1) {
          const mid = Math.floor((lo + hi) / 2);
          textEl.style.fontSize = `${mid}px`;
          const widthFit = textEl.getComputedTextLength();
          const heightFit = Math.max(4, textEl.getBBox().height);
          if (widthFit <= availableWidth && heightFit <= availableHeight) {
            best = mid;
            lo = mid + 1;
          } else {
            hi = mid - 1;
          }
        }

        textEl.style.fontSize = `${best}px`;
      }

      function layoutNodeTopTexts(node, config, params = null) {
        const spaceLabels = [...node.querySelectorAll("text.space-label")].filter((line) => !line.classList.contains("chip-value-hidden"));
        const typeText = config.typeText || node.querySelector("text.chip-type");
        const outer = config.outer || node.querySelector("rect[width='172'][height='96']");
        if (!spaceLabels.length || !outer) {
          return;
        }

        const nodeX = getRectValue(outer, "x");
        const nodeY = getRectValue(outer, "y");
        const topRowY0 = nodeY + 3;
        const topRowY1 = topRowY0 + NODE_TEMPLATE.topRowHeight;
        if (params?.nameLines?.length) {
          for (let i = 0; i < Math.min(spaceLabels.length, params.nameLines.length); i += 1) {
            spaceLabels[i].textContent = params.nameLines[i] || "";
          }
        }
        const nameLeft = nodeX + NODE_TEMPLATE.categoryWidth;
        const stableCellLeft = nodeX + NODE_TEMPLATE.width - NODE_TEMPLATE.stabilityWidth;
        const stableCellRight = nodeX + NODE_TEMPLATE.width;
        const nameRight = Math.max(nameLeft + 24, stableCellLeft - 3);
        const nameTextLeft = nameLeft + 3;
        const nameTextRight = nameRight - 2;

        const typeY = Number.parseFloat(typeText?.getAttribute("y") || `${nodeY + 15}`);
        const lines = spaceLabels.slice().sort((a, b) => {
          return (Number.parseFloat(a.getAttribute("y") || "0") - Number.parseFloat(b.getAttribute("y") || "0"));
        });
        const rowCount = lines.length;
        const slotHeight = (topRowY1 - topRowY0 - 2) / Math.max(1, rowCount);
        lines.forEach((lineText, lineIndex) => {
          const lineTop = topRowY0 + 1 + lineIndex * slotHeight;
          const lineBottom = Math.min(topRowY1 - 1, topRowY0 + 1 + (lineIndex + 1) * slotHeight);
          lineText.setAttribute("x", String((nameTextLeft + nameTextRight) / 2));
          lineText.setAttribute("text-anchor", "middle");
          lineText.setAttribute("y", String((lineTop + lineBottom) / 2));
          fitTextToRect(lineText, nameTextLeft, nameTextRight, lineTop, lineBottom);
        });
        if (typeText) {
          typeText.setAttribute("x", String((nodeX + nameLeft) / 2));
          typeText.setAttribute("y", String((topRowY0 + topRowY1) / 2));
          typeText.setAttribute("dominant-baseline", "middle");
          fitTextToRect(typeText, nodeX + 1, nameLeft - 1, topRowY0 + 1, topRowY1 - 1);
        }

        upsertStabilityBadge(node, Number.parseInt(node.dataset.stability || "0", 10) || 0, stableCellLeft, stableCellRight, topRowY0, topRowY1);
      }

      function upsertStabilityBadge(node, stability, left, right, topRowY0, topRowY1) {
        let badge = node.querySelector("text.chip-stability");
        if (!badge) {
          badge = document.createElementNS("http://www.w3.org/2000/svg", "text");
          badge.setAttribute("class", "chip-stability");
          badge.setAttribute("dominant-baseline", "middle");
          badge.setAttribute("text-anchor", "middle");
          node.appendChild(badge);
        }

        const stableLeft = Number.isFinite(left)
          ? left
          : (() => {
            const outer = [...node.querySelectorAll("rect")].find((rect) => {
              const w = getRectValue(rect, "width");
              const h = getRectValue(rect, "height");
              return Math.abs(w - NODE_TEMPLATE.width) < 0.5 && Math.abs(h - NODE_TEMPLATE.height) < 0.5;
            });
            return getRectValue(outer, "x") + NODE_TEMPLATE.width - NODE_TEMPLATE.stabilityWidth;
          })();
        const stableRight = Number.isFinite(right)
          ? right
          : stableLeft + 14;
        const defaultTop = [...node.querySelectorAll("rect")].find((rect) => {
          const w = getRectValue(rect, "width");
          const h = getRectValue(rect, "height");
          return Math.abs(w - NODE_TEMPLATE.width) < 0.5 && Math.abs(h - NODE_TEMPLATE.height) < 0.5;
        });
        const top = Number.isFinite(topRowY0)
          ? topRowY0
          : getRectValue(defaultTop, "y") + 3;
        const bottom = Number.isFinite(topRowY1)
          ? topRowY1
          : top + NODE_TEMPLATE.topRowHeight;

        badge.setAttribute("x", String((stableLeft + stableRight) / 2));
        badge.setAttribute("y", String((top + bottom) / 2));
        badge.textContent = String(stability);
        fitTextToRect(badge, stableLeft, stableRight, top + 1, bottom - 1);
        return badge;
      }

      function showMapLoadError(message) {
        if (!root) {
          return;
        }
        root.innerHTML = "";
        const box = document.createElement("div");
        box.style.cssText = "margin: 20px; padding: 12px; border: 1px solid #fecaca; border-radius: 8px; background: #fef2f2; color: #991b1b; font-size: 14px; line-height: 1.4;";
        box.innerHTML = `
          <strong>Map failed to load</strong><br />
          ${message || "Check the resource paths and reload."}<br />
          Start a local server with <code>python3 -m http.server 8000</code>, then open <code>http://127.0.0.1:8000/1989_compact_map_interactive.html</code>.
        `;
        root.appendChild(box);
      }

      function setNodeValue(node, side, delta, title) {
        const dem = Number.parseInt(node.dataset.dem || "0", 10) || 0;
        const com = Number.parseInt(node.dataset.com || "0", 10) || 0;
        if (side === "D") {
          const next = Math.max(0, dem + delta);
          node.dataset.dem = String(next);
        } else {
          const next = Math.max(0, com + delta);
          node.dataset.com = String(next);
        }
        node.dataset.side = side;
        applyDominanceStyle(node);
        interactiveNodes.forEach(updateNodeTooltip);
        refreshCountryPanels();
        persistGameState();
        logDebugLine(`${title}: ${side} ${delta > 0 ? "+" : "-"}1, D=${node.dataset.dem}, C=${node.dataset.com}, S=${node.dataset.stability}`);
        setStatus(
          `${title}: D ${node.dataset.dem} / C ${node.dataset.com}; clicked ${side}`,
        );
      }

      function createMouseEvt(type, button = 0) {
        return new MouseEvent(type, {
          bubbles: true,
          cancelable: true,
          view: window,
          button,
        });
      }

      function trimLoadedMap(svgEl) {
        svgEl.querySelectorAll(".title, .subtitle").forEach((element) => element.remove());
        svgEl.querySelectorAll(".score-label").forEach((label) => {
          const scoreBox = label.previousElementSibling;
          const scoreValue = label.nextElementSibling;
          if (scoreBox?.tagName?.toLowerCase() === "rect") {
            scoreBox.remove();
          }
          if (scoreValue?.classList?.contains("score-value")) {
            scoreValue.remove();
          }
          label.remove();
        });
        svgEl.querySelectorAll(".score-value").forEach((element) => element.remove());
        const pageWidth = Number.parseFloat(svgEl.getAttribute("width") || "1710") || 1710;
        const pageHeight = Number.parseFloat(svgEl.getAttribute("height") || "2020") || 2020;
        const topTrim = 110;
        const bottomTrim = 45;
        const viewHeight = Math.max(1, pageHeight - topTrim - bottomTrim);
        svgEl.setAttribute("viewBox", `0 ${topTrim} ${pageWidth} ${viewHeight}`);
        svgEl.setAttribute("width", String(pageWidth));
        svgEl.setAttribute("height", String(viewHeight));
      }

      function runSmokeClickTest(nodes) {
        const tested = nodes.slice(0, Math.min(6, nodes.length));
        let ok = 0;
        let fail = 0;

        tested.forEach((node, index) => {
          const demText = node.querySelector("text.chip-value-left");
          const comText = node.querySelector("text.chip-value-right");
          if (!demText && !comText) {
            return;
          }
          const title = node.dataset.baseTitle || `Node #${index + 1}`;
          const initialDem = Number.parseInt(node.dataset.dem || "0", 10) || 0;
          const initialCom = Number.parseInt(node.dataset.com || "0", 10) || 0;
          const initialStability = Number.parseInt(node.dataset.stability || "0", 10) || 0;
          const slotRects = getNodeSlotRects(node);
          if (slotRects.length < 2) {
            return;
          }

          slotRects[0].dispatchEvent(createMouseEvt("click", 0));
          const afterDemInc = Number.parseInt(node.dataset.dem || "0", 10) || 0;
          const stabAfterDemInc = Number.parseInt(node.dataset.stability || "0", 10) || 0;

          if (afterDemInc === initialDem + 1 && stabAfterDemInc === initialStability) {
            ok += 1;
          } else {
            fail += 1;
            logDebugLine(`[Smoke] ${title} D+1 failed: ${initialDem}/${initialCom}/${initialStability} -> ${afterDemInc}/${node.dataset.com}/${stabAfterDemInc}`);
          }

          slotRects[0].dispatchEvent(createMouseEvt("contextmenu", 2));
          const afterDemBack = Number.parseInt(node.dataset.dem || "0", 10) || 0;
          const stabAfterDemBack = Number.parseInt(node.dataset.stability || "0", 10) || 0;
          if (afterDemBack === initialDem && stabAfterDemBack === initialStability) {
            ok += 1;
          } else {
            fail += 1;
            logDebugLine(`[Smoke] ${title} D-1 failed: ${initialDem}/${initialCom}/${initialStability} -> ${afterDemBack}/${node.dataset.com}/${stabAfterDemBack}`);
          }

          slotRects[1].dispatchEvent(createMouseEvt("click", 0));
          const afterComInc = Number.parseInt(node.dataset.com || "0", 10) || 0;
          const stabAfterComInc = Number.parseInt(node.dataset.stability || "0", 10) || 0;
          if (afterComInc === initialCom + 1 && stabAfterComInc === initialStability) {
            ok += 1;
          } else {
            fail += 1;
            logDebugLine(`[Smoke] ${title} C+1 failed: ${initialDem}/${initialCom}/${initialStability} -> ${node.dataset.dem}/${afterComInc}/${stabAfterComInc}`);
          }

          slotRects[1].dispatchEvent(createMouseEvt("contextmenu", 2));
          const afterComBack = Number.parseInt(node.dataset.com || "0", 10) || 0;
          const stabAfterComBack = Number.parseInt(node.dataset.stability || "0", 10) || 0;
          if (afterComBack === initialCom && stabAfterComBack === initialStability) {
            ok += 1;
          } else {
            fail += 1;
            logDebugLine(`[Smoke] ${title} C-1 failed: ${initialDem}/${initialCom}/${initialStability} -> ${node.dataset.dem}/${afterComBack}/${stabAfterComBack}`);
          }
        });

        logDebugLine(`Smoke test complete: passed ${ok}, failed ${fail}`);
        setStatus(`Smoke test complete: passed ${ok}, failed ${fail}`);
      }

      async function loadMap() {
        try {
          await loadGameData();
          const response = await fetch(MAP_URL);
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }
          const svgText = await response.text();
          const parsed = new DOMParser().parseFromString(svgText, "image/svg+xml");
          const parseError = parsed.querySelector("parsererror");
          if (parseError) {
            throw new Error("SVG parse failed");
          }

          const svgEl = parsed.documentElement;
          svgEl.id = "compact-map-svg";
          svgEl.setAttribute("role", "img");
          svgEl.setAttribute("aria-label", "1989 compact map");
          svgEl.setAttribute("preserveAspectRatio", "xMidYMid meet");
          trimLoadedMap(svgEl);
          root.innerHTML = "";
          root.appendChild(svgEl);
          mountMapTrackers(svgEl);
          mountStaticInfoPanels(svgEl);
          mountCountryInfoPanels(svgEl);

          const nodes = [...svgEl.querySelectorAll("g.node")];
          let bound = 0;
          const nodeTemplates = nodes.map((node, idx) => {
            const title = (node.querySelector("title")?.textContent || `Node #${idx + 1}`).trim();
            node.dataset.baseTitle = title;
            const config = collectNodeTemplateParams(node, idx + 1);
            if (!config) {
              return null;
            }
            const setup = getPartyForNode(config.spaceName, config.countryName || "");
            const stability = getStabilityForNode(config.spaceName, config.countryName || "");
            return buildCompactNodeTemplate(config, {
              name: config.name,
              category: config.category,
              important: config.important,
              initialDem: setup ? setup.dem : 0,
              initialCom: setup ? setup.com : 0,
              stability,
            });
          }).filter(Boolean);

          nodeTemplates.forEach((template) => {
            const node = template.node;
            const title = template.name || template.spaceName || "Unknown space";
            renderCompactNodeFromTemplate(template);

            const slotRects = template.slotRects;
            if (slotRects.length >= 2) {
              bindSlot(node, slotRects[0], "D", title);
              bindSlot(node, slotRects[1], "C", title);
            } else {
              const onIncrease = (event) => {
                event.preventDefault();
                const currentSide = getPointerSideFromSlots(node, event);
                setNodeValue(node, currentSide, +1, title);
              };
              const onDecrease = (event) => {
                event.preventDefault();
                const currentSide = getPointerSideFromSlots(node, event);
                setNodeValue(node, currentSide, -1, title);
              };
              node.addEventListener("click", onIncrease);
              node.addEventListener("contextmenu", onDecrease);
            }
            bound += 1;
          });
          interactiveNodes = nodeTemplates.map((template) => template.node).filter(Boolean);
          refreshCountryPanels();


          setStatus(`Loaded ${bound} interactive spaces (${bound} of 75 spaces can edit SP).`);
          if (vpValue) {
            updateVp(0);
            vpTracker.addEventListener("click", (event) => {
              event.preventDefault();
              updateVp(-1);
            });
            vpTracker.addEventListener("contextmenu", (event) => {
              event.preventDefault();
              updateVp(+1);
            });
          }
          if (phaseValue) {
            updatePhase(0);
            phaseTracker.addEventListener("click", (event) => {
              event.preventDefault();
              updatePhase(-1);
            });
            phaseTracker.addEventListener("contextmenu", (event) => {
              event.preventDefault();
              updatePhase(+1);
            });
          }
          if (tiananmenTracker) {
            renderTiananmenTrack();
          }
          if (tiananmenDemFailed) {
            tiananmenDemFailed.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              toggleTiananmenFailure("D");
            });
          }
          if (tiananmenComFailed) {
            tiananmenComFailed.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              toggleTiananmenFailure("C");
            });
          }
          if (tiananmenDemAttempted) {
            tiananmenDemAttempted.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              toggleTiananmenAttempted("D");
            });
          }
          if (tiananmenComAttempted) {
            tiananmenComAttempted.addEventListener("click", (event) => {
              event.preventDefault();
              event.stopPropagation();
              toggleTiananmenAttempted("C");
            });
          }
          if (diceButton) {
            diceButton.addEventListener("click", (event) => {
              event.preventDefault();
              openDiceModal();
            });
          }
          if (languageButton) {
            languageButton.addEventListener("click", (event) => {
              event.preventDefault();
              toggleLanguage();
            });
          }
          if (diceReroll) {
            diceReroll.addEventListener("click", (event) => {
              event.preventDefault();
              rollDie();
            });
          }
          [diceClose, diceCloseIcon].forEach((button) => {
            button?.addEventListener("click", (event) => {
              event.preventDefault();
              closeDiceModal();
            });
          });
          diceModal?.addEventListener("click", (event) => {
            if (event.target === diceModal) {
              closeDiceModal();
            }
          });
          document.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && diceModal && !diceModal.hidden) {
              closeDiceModal();
            }
          });
          if (saveButton) {
            saveButton.addEventListener("click", (event) => {
              event.preventDefault();
              saveGameState();
            });
          }
          if (loadButton) {
            loadButton.addEventListener("click", (event) => {
              event.preventDefault();
              loadGameState();
            });
          }
          if (resetButton) {
            resetButton.addEventListener("click", (event) => {
              event.preventDefault();
              resetGameToStart();
            });
          }
          applyLanguage({ persist: false });
          autoSaveReady = true;

          if (SMOKE_TEST) {
            runSmokeClickTest(nodes);
          }
        } catch (error) {
          const message = [
            "Map failed to load: ",
            String(error.message || error),
            ". Open this page through a local HTTP server, such as python -m http.server.",
          ].join("");
          showMapLoadError(message);
          setStatus(message);
        }
      }

      loadMap();
    </script>
  </body>
</html>
